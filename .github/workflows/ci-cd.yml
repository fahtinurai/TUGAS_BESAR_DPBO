name: CI CT Inspection CD Pipeline

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  ARTIFACT_NAME: DiagramMaster
  SONAR_PROJECT_KEY: fahtinurai_TUGAS_BESAR_DPBO
  SONAR_ORGANIZATION: adefathian
  SONAR_HOST_URL: https://sonarcloud.io

jobs:
  build:
    name: Continuous Integration - Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build project with Maven
        run: mvn -B -DskipTests clean package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiagramMaster
          path: target/*.jar

  test:
    name: Continuous Testing - Unit Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run unit tests
        run: mvn -B test

  inspect:
    name: Continuous Inspection - SonarCloud
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and generate reports for SonarCloud
        run: mvn -B clean verify

      - name: Validate SonarCloud token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is empty or not found"
            exit 1
          fi

          SONAR_TOKEN_CLEAN=$(printf "%s" "$SONAR_TOKEN" | tr -d '\r\n')

          echo "Checking whether SONAR_TOKEN is valid..."
          curl -s -u "$SONAR_TOKEN_CLEAN:" "$SONAR_HOST_URL/api/authentication/validate"
          echo ""

          echo "Checking whether token can access the SonarCloud project..."
          curl -s -u "$SONAR_TOKEN_CLEAN:" "$SONAR_HOST_URL/api/components/show?component=$SONAR_PROJECT_KEY"
          echo ""

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=fahtinurai_TUGAS_BESAR_DPBO
            -Dsonar.organization=adefathian
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.java.binaries=target/classes
            -Dsonar.junit.reportPaths=target/surefire-reports
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  deploy-staging:
    name: Continuous Delivery - Deploy to Staging
    runs-on: ubuntu-latest
    needs: inspect
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: DiagramMaster
          path: staging

      - name: Deploy artifact to staging
        run: |
          echo "Deploying DiagramMaster artifact to staging environment..."
          ls -lh staging
          echo "Staging deployment completed successfully."

  deploy-production:
    name: Continuous Delivery - Production Approval
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: DiagramMaster
          path: production

      - name: Release artifact to production
        run: |
          echo "Manual approval accepted."
          echo "Delivering DiagramMaster artifact to production environment..."
          ls -lh production
          echo "Production delivery completed successfully."
