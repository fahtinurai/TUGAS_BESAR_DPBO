name: CI CT Inspection CD Pipeline

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  ARTIFACT_NAME: DiagramMaster

jobs:
  build:
    name: Continuous Integration - Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build project with Maven
        run: mvn -B -DskipTests clean package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiagramMaster
          path: target/*.jar

  test:
    name: Continuous Testing - Unit Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run unit tests
        run: mvn -B test

  inspect:
    name: Continuous Inspection - SonarCloud
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Check SonarCloud token
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "SONAR_TOKEN is empty or not found"
            exit 1
          else
            echo "SONAR_TOKEN is available"
          fi

      - name: Run SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=fahtinurai_TUGAS_BESAR_DPBO \
            -Dsonar.organization=adefathian \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.qualitygate.wait=true

  deploy-staging:
    name: Continuous Delivery - Deploy to Staging
    runs-on: ubuntu-latest
    needs: inspect
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: DiagramMaster
          path: staging

      - name: Deploy artifact to staging
        run: |
          echo "Deploying DiagramMaster artifact to staging environment..."
          ls -lh staging
          echo "Staging deployment completed successfully."

  deploy-production:
    name: Continuous Delivery - Production Approval
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: DiagramMaster
          path: production

      - name: Release artifact to production
        run: |
          echo "Manual approval accepted."
          echo "Delivering DiagramMaster artifact to production environment..."
          ls -lh production
          echo "Production delivery completed successfully."
